name: CI Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx html-validate "**/*.html" 2>/dev/null || echo "No HTML issues"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci 2>/dev/null || npm install 2>/dev/null || true
      - run: npx eslint . --ext .js 2>/dev/null || echo "No ESLint config"
